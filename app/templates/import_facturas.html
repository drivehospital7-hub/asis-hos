<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Sexo - Genderize</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        .drop-zone { border: 2px dashed #ccc; padding: 40px; text-align: center; margin: 20px 0; cursor: pointer; }
        .drop-zone.dragover { border-color: #007bff; background: #f0f8ff; }
        .drop-zone p { margin: 0; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; margin: 5px; }
        button:disabled { background: #ccc; }
        button.secondary { background: #28a745; }
        #result { margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
        .stats-box { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .stats-box h3 { margin-top: 0; }
        .stats-box .stat { display: inline-block; margin-right: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        .warning-row { background: #fff3cd; }
        .danger-row { background: #f8d7da; }
        .corrected-row { background: #d4edda; }
        .btn-corregir {
            background: #ffc107;
            color: #000;
            padding: 4px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-corregir:hover { background: #e0a800; }
        .btn-corregir:disabled { background: #6c757d; cursor: not-allowed; }
        .name-part { 
            display: inline-block;
            background: #e9ecef;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 13px;
        }
        .compound-sep {
            color: #6c757d;
            margin: 0 4px;
        }
    </style>
</head>
<body>
    <h1>Verificar Sexo con Genderize</h1>
    <p>Sube el Excel de facturas para verificar el sexo contra la API Genderize</p>
    
    <form id="uploadForm" enctype="multipart/form-data">
        <div class="drop-zone" id="dropZone">
            <p>Arrastra el archivo Excel aquí o haz click para seleccionar</p>
            <input type="file" id="fileInput" name="file" accept=".xlsx,.xls" style="display:none">
        </div>
        <div>
            <button type="button" id="statsBtn" disabled>Ver Estadísticas</button>
            <button type="button" id="verifyBtn" class="secondary" disabled>Verificar y Comparar</button>
        </div>
    </form>
    
    <div id="result"></div>
    
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statsBtn = document.getElementById('statsBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const uploadForm = document.getElementById('uploadForm');
        const resultDiv = document.getElementById('result');
        
        let selectedFile = null;
        
        dropZone.addEventListener('click', () => fileInput.click());
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => { e.preventDefault(); });
        });
        
        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        
        dropZone.addEventListener('drop', e => {
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                selectFile(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', e => {
            if (e.target.files.length) selectFile(e.target.files[0]);
        });
        
        function selectFile(file) {
            selectedFile = file;
            dropZone.querySelector('p').textContent = file.name;
            statsBtn.disabled = false;
            verifyBtn.disabled = false;
        }
        
        async function doRequest(endpoint, btn, btnText) {
            if (!selectedFile) return;
            btn.disabled = true;
            btn.textContent = 'Procesando...';
            resultDiv.innerHTML = '<p>Cargando...</p>';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    showResult(data.data, endpoint.includes('stats'));
                } else {
                    resultDiv.innerHTML = `<p class="error">✗ Error: ${data.errors.join(', ')}</p>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">✗ Error: ${err.message}</p>`;
            }
            
            btn.disabled = false;
            btn.textContent = btnText;
        }
        
        function showResult(data, isStats) {
            let html = '';
            
            if (data.stats || isStats) {
                const stats = data.stats || data;
                html += '<div class="stats-box">';
                html += '<h3>Estadísticas</h3>';
                html += `<div class="stat"><strong>Total Excel:</strong> ${stats.total_excel}</div>`;
                html += `<div class="stat"><strong>Nombres únicos:</strong> ${stats.nombres_unicos}</div>`;
                html += `<div class="stat"><strong>En cache:</strong> ${stats.cache_hits}</div>`;
                html += `<div class="stat"><strong>API calls:</strong> ${stats.api_calls_necesarias}</div>`;
                html += '</div>';
            }
            
            if (data.discrepancies) {
                html += `<p><strong>Discrepancias encontradas:</strong> ${data.total_discrepancies}</p>`;
                
                if (data.discrepancies.length > 0) {
                    html += '<table id="discTable">';
                    html += '<tr><th>Número Factura</th><th>Nombre Completo</th><th>Nombres Evaluados</th><th>Sexo Excel</th><th>Sexo API</th><th>Acción</th></tr>';
                    
                    data.discrepancies.forEach((d, i) => {
                        const namesEval = d.segundo_nombre 
                            ? `<span class="name-part">${d.primer_nombre}</span><span class="compound-sep">+</span><span class="name-part">${d.segundo_nombre}</span>`
                            : `<span class="name-part">${d.primer_nombre}</span>`;
                        html += `<tr class="danger-row" id="disc-row-${i}">`;
                        html += `<td>${d.numero_factura}</td>`;
                        html += `<td><strong>${d.nombre_completo}</strong></td>`;
                        html += `<td>${namesEval}</td>`;
                        html += `<td>${d.sexo_excel}</td>`;
                        html += `<td>${d.sexo_api}</td>`;
                        html += `<td><button class="btn-corregir" onclick="corregirGenero('${d.nombre_normalizado}', '${d.sexo_excel}', ${i})">Corregir → ${d.sexo_excel}</button></td>`;
                        html += '</tr>';
                    });
                    
                    html += '</table>';
                }
            }
            
            resultDiv.innerHTML = html;
        }
        
        async function corregirGenero(nombreNormalizado, sexoExcel, rowIndex) {
            const btn = document.querySelector(`#disc-row-${rowIndex} .btn-corregir`);
            if (!btn || btn.disabled) return;
            
            btn.disabled = true;
            btn.textContent = 'Corrigiendo...';
            
            try {
                const resp = await fetch('/api/import/cache-corregir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre_normalizado: nombreNormalizado,
                        genero: sexoExcel,
                    }),
                });
                const data = await resp.json();
                
                if (data.status === 'success') {
                    const row = document.getElementById(`disc-row-${rowIndex}`);
                    row.className = 'corrected-row';
                    btn.textContent = '✓ Corregido';
                    btn.style.background = '#28a745';
                    btn.style.color = '#fff';
                } else {
                    alert('Error: ' + data.errors.join(', '));
                    btn.disabled = false;
                    btn.textContent = 'Corregir → ' + sexoExcel;
                }
            } catch (err) {
                alert('Error de red: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Corregir → ' + sexoExcel;
            }
        }
        
        statsBtn.addEventListener('click', () => doRequest('/api/import/facturas-stats', statsBtn, 'Ver Estadísticas'));
        verifyBtn.addEventListener('click', () => doRequest('/api/import/facturas-verify', verifyBtn, 'Verificar y Comparar'));
    </script>
</body>
</html>
