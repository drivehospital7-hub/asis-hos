{% extends "base.html" %}

{% block title %}Control de Facturas — EPS MALLAMAS{% endblock %}

{% block content %}
<div class="home">
  <header class="home__header">
    <h1 class="home__title">Control de Facturas</h1>
    <p class="home__subtitle">Selecciona el area de trabajo</p>
  </header>

  <section class="home__areas">
    <a href="{{ url_for('excel_headers.excel_headers_page') }}" class="area-card">
      <div class="area-card__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </div>
      <div class="area-card__content">
        <h2 class="area-card__title">Odontologia</h2>
        <p class="area-card__description">Procesamiento de facturas odontologicas</p>
      </div>
      <div class="area-card__arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </a>
  </section>
</div>
{% endblock %}
